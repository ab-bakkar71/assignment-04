<!DOCTYPE html>
<html lang="en" data-theme="nord">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-04</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <!-- google font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body>
    <main class="max-w-[1110px] mx-auto">
        <header>
            <h1 class="text-[32px] font-bold mt-[60px]">Job Application Tracker</h1>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-5">
            <div class="bg-white p-5 space-y-2 rounded-lg">
                <h4 class="text-[#323B49] font-medium">Total</h4>
                <p class="text-[#002C5C] text-2xl font-bold">0</p>
            </div>
            <div class="bg-white p-5 space-y-2 rounded-lg">
                <h4 class="text-[#323B49] font-medium">Interview</h4>
                <p class="text-green-400 text-2xl font-bold">0</p>
            </div>
            <div class="bg-white p-5 space-y-2 rounded-lg">
                <h4 class="text-[#323B49] font-medium">Rejected</h4>
                <p class="text-red-400 text-2xl font-bold">0</p>
            </div>
            </div>
            <hr class="my-7 text-[#E6E7E9]">
        </header>

    </main>
    
    


    <script src="./script.js"></script>
</body>
</html>
